# stoneburner probe profile: gpu-host vLLM gateway
# Targets the LiteLLM gateway (OpenAI-compatible) running on the lab gpu-host.
# Use: atomics probe --probes-file profiles/vllm-gateway.yaml
#
# The gateway serves 3 models simultaneously on port 8000.
# All inference stays on the LAN — nothing leaves to external APIs.

targets:
  - name: gpu-host-gateway-health
    artifact_type: inference-api
    source: http
    url: http://gpu-host:8000/v1/models
    description: "LiteLLM gateway model list — confirms all 3 vLLM backends are up"

  - name: gpu-host-qwen25-1-5b
    artifact_type: inference-api
    source: http
    url: http://gpu-host:8001/v1/models
    description: "vLLM qwen2.5:1.5b (AWQ) on :8001 — app-gate tier"

  - name: gpu-host-qwen25-3b
    artifact_type: inference-api
    source: http
    url: http://gpu-host:8002/v1/models
    description: "vLLM qwen2.5:3b (AWQ) on :8002 — policy-service baseline"

  - name: gpu-host-qwen3-0-6b
    artifact_type: inference-api
    source: http
    url: http://gpu-host:8003/v1/models
    description: "vLLM Qwen3-0.6B (FP16) on :8003 — target-app / resistant tier"
